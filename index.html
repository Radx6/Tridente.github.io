<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Strona.css">
    <link rel="shortcut icon" href="tridente.png" type="image/x-icon">
    <title>Kartel Tridente Di Sangue</title>
</head>
<body>
<header id="header">
    <h1>Kartel Tridente Di Sangue</h1>
</header>
<main class="main" id="glowne">
    <li>
    <a href="Cennik.html">Cennik</a>
    <a href="discord.html">Discord</a>
    <a href="Galeria.html">Garleria</a>
    </li>
</main>
<div class="player" id="audioContainer">
  <select id="playlist" onchange="changeSong()">
    <option value="Kartky - Outside (prod. HVZX).mp3">Outside</option>
    <option value="Sassy Scene - Faster N Harder (Slowed & Reverbed).mp3">RockStar</option>
    <option value="song3.mp3">Piosenka 3</option>
    <option value="song4.mp3">Piosenka 4</option>
  </select>
  <br>
  <button id="playBtn">Play</button>
  <button id="pauseBtn">Pause</button>
  <button id="stopBtn">Stop</button>
  <br>
  <label for="volume">Głośność:</label>
  <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">
  
  <!-- Jeden odtwarzacz audio -->
  <audio id="audioPlayer" loop>
    <source src="Kartky - Outside (prod. HVZX).mp3" type="audio/mpeg">
    Twoja przeglądarka nie obsługuje audio.
  </audio>
</div>
<style>
#audioContainer {
  position: fixed;
  bottom: 10px;
  right: 10px;
  background: transparent;
  padding: 10px;
  z-index: 1000;
  text-align: center;
}

.player button{
    font-size:20px;
    padding:10px 25px;
    border:none;
    background:#8b0000;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

.player button:hover{
    background:#b30000;
}

select {
  background: transparent;
  color: white;
  border: 1px solid #fff;
  border-radius: 5px;
  padding: 5px;
  margin-bottom: 5px;
}

input[type=range] {
  width: 100px;
  margin-top: 5px;
}
</style>

<script>
const player = document.getElementById('audioPlayer');
const select = document.getElementById('playlist');
const volumeSlider = document.getElementById('volume');

function changeSong() {
  player.src = select.value; // zmiana źródła w odtwarzaczu
  player.play();
}

document.getElementById('playBtn').addEventListener('click', () => player.play());
document.getElementById('pauseBtn').addEventListener('click', () => player.pause());
document.getElementById('stopBtn').addEventListener('click', () => {
  player.pause();
  player.currentTime = 0;
});

volumeSlider.addEventListener('input', () => {
  player.volume = volumeSlider.value;
});

// ustawienie początkowej głośności
player.volume = volumeSlider.value;
</script>
</footer>
</body>
</html>
