<script>

// ===== MUZYKA =====
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const title = document.getElementById("title");

let songs = [
    "Muzyka/PRO8L3M - VHS.mp3",
    "Muzyka/ritz.mp3",
    "Muzyka/blok.mp3",
    "Muzyka/czarownica.mp3"
];

let names = [
    "PRO8L3M - VHS",
    "Ritz Carlton Remix",
    "DISCODŻEMIK",
    "Czarownica"
];

let current = 0;

function loadSong(index) {
    audio.src = songs[index];
    title.textContent = names[index];
}

function togglePlay() {
    if (audio.paused) {
        audio.play();
        playBtn.textContent = "⏸";
    } else {
        audio.pause();
        playBtn.textContent = "▶";
    }
}

function nextSong() {
    current++;
    if (current >= songs.length) current = 0;
    loadSong(current);
    audio.play();
    playBtn.textContent = "⏸";
}

// progress bar
audio.addEventListener("timeupdate", () => {
    document.getElementById("progress").value =
        (audio.currentTime / audio.duration) * 100 || 0;
});

// start
loadSong(current);

</script>
