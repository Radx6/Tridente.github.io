<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Strona.css">
    <link rel="shortcut icon" href="tridente.png" type="image/x-icon">
    <title>Kartel Tridente Di Sangue</title>
</head>
<body>
<header id="header">
    <h1>Kartel Tridente Di Sangue</h1>
</header>
<main class="main" id="glowne">
    <li>
    <a href="Cennik.html">Cennik</a>
    <a href="discord.html">Discord</a>
    <a href="Galeria.html">Garleria</a>
    </li>
</main>
<div class="player" id="audioContainer">
  <select id="playlist" onchange="changeSong()">
    <option value="song1.mp3">Outside</option>
    <option value="song2.mp3">Piosenka 2</option>
    <option value="song3.mp3">Piosenka 3</option>
  </select>
  <br>
  <button onclick="playSong()">Play</button>
  <button onclick="pauseSong()">Pause</button>
  <button onclick="stopSong()">Stop</button>
  <audio id="audioPlayer" loop>
    <source src="Kartky - Outside (prod. HVZX).mp3" type="audio/mpeg">
    Twoja przeglądarka nie obsługuje audio.
  </audio>
</div>

<style>
#audioContainer {
  position: fixed;
  bottom: 10px;
  right: 10px;
  padding: 10px;
  z-index: 1000;
  text-align: center;
}

/* Twój styl przycisków */
.player button{
    font-size:20px;
    padding:10px 25px;
    border:none;
    background:#8b0000;

    border-radius:10px;
    cursor:pointer;
}

.player button:hover{
    background:#b30000;
}

/* Minimalny styl select */
select {
  background: transparent;
  color: white;
  border: 1px solid #fff;
  border-radius: 5px;
  padding: 5px;
  margin-bottom: 5px;
}
</style>

<script>
var player = document.getElementById('audioPlayer');
var select = document.getElementById('playlist');

function changeSong() {
  player.src = select.value;
  player.play();
}

function playSong() {
  player.play();
}

function pauseSong() {
  player.pause();
}

function stopSong() {
  player.pause();
  player.currentTime = 0;
}
</script>
<script src="Muzyka.js"></script>
</footer>
</body>
</html>
