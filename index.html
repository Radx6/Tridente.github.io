<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Maincss/galeria.css">
    <link rel="shortcut icon" href="Zdjecia/tridente.png">
    <title>Tridente Di Sangue</title>
</head>

<body id="wrapper">

<section>
<main>

<h1>Tridente Di Sangue</h1>

<div class="spotify-player">

    <img src="Zdjecia/tridente.png" class="cover">

    <div class="info">
        <div id="title">Tridente Theme</div>
        <input type="range" id="progress" value="0">
    </div>

    <button onclick="togglePlay()" id="playBtn">▶</button>
    <button onclick="nextSong()">⏭</button>

    <br><br>

    🔊 <input type="range" min="0" max="1" step="0.01" onchange="audio.volume = this.value">

    <audio id="audio"></audio>

</div>

</main>
</section>

<script>

// ===== MUZYKA =====
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const title = document.getElementById("title");

let songs = [
    "Muzyka/vhs.mp3",
    "Muzyka/ritz.mp3",
    "Muzyka/blok.mp3",
    "Muzyka/czarownica.mp3"
];

let names = [
    "PRO8L3M - VHS",
    "Ritz Carlton Remix",
    "DISCODŻEMIK",
    "Czarownica"
];

let current = 0;

function loadSong(index) {
    audio.src = songs[index];
    title.textContent = names[index];
}

function togglePlay() {
    if (audio.paused) {
        audio.play();
        playBtn.textContent = "⏸";
    } else {
        audio.pause();
        playBtn.textContent = "▶";
    }
}

function nextSong() {
    current++;
    if (current >= songs.length) current = 0;
    loadSong(current);
    audio.play();
    playBtn.textContent = "⏸";
}

// progress bar
audio.addEventListener("timeupdate", () => {
    document.getElementById("progress").value =
        (audio.currentTime / audio.duration) * 100 || 0;
});

// start
loadSong(current);

</script>

</body>
</html>
