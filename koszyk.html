<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Koszyk</title>
<link rel="stylesheet" href="style2.css">
</head>
<body>

<main>
<h1>Twój Koszyk</h1>

<table border="1">
<thead>
<tr>
<th>Produkt</th>
<th>Ilość</th>
<th>Cena</th>
<th>Wartość</th>
</tr>
</thead>
<tbody id="koszykBody"></tbody>
</table>

<h2 id="suma"></h2>

<a href="index.html">
<button>Wróć do sklepu</button>
</a>

<button id="zatwierdz">Zatwierdź zamówienie</button>

</main>

<script>
let koszyk = JSON.parse(localStorage.getItem("koszyk")) || [];
let koszykBody = document.getElementById("koszykBody");
let suma = 0;

koszyk.forEach(produkt => {
    let wartosc = produkt.ilosc * produkt.cena;
    suma += wartosc;

    koszykBody.innerHTML += `
        <tr>
            <td>${produkt.nazwa}</td>
            <td>${produkt.ilosc}</td>
            <td>${produkt.cena}$</td>
            <td>${wartosc}$</td>
        </tr>
    `;
});

document.getElementById("suma").innerText = "Suma: " + suma + "$";

document.getElementById("zatwierdz").addEventListener("click", function(){
    alert("Zamówienie zostało przyjęte.");
    localStorage.removeItem("koszyk");
    window.location.href = "index.html";
});
</script>

</body>
</html>
