<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="koszyk.css">
<title>Koszyk</title>
</head>
<body>

<h1>Twój koszyk</h1>

<div id="listaKoszyka"></div>

<script>

let koszyk = JSON.parse(localStorage.getItem("koszyk")) || [];

let lista = document.getElementById("listaKoszyka");

koszyk.forEach(p => {

let div = document.createElement("div");

div.innerHTML =
p.nazwa + " | ilość: " + p.ilosc + " | cena: " + (p.cena * p.ilosc) + "$";

lista.appendChild(div);

});

</script>
<div class="player">

<button onclick="toggleMusic()" id="playBtn">▶</button>

<select id="songList">
<option value="Kartky - Outside (prod. HVZX).mp3">Outside</option>
<option value="piosenka2.mp3">Piosenka 2</option>
<option value="piosenka3.mp3">Piosenka 3</option>
</select>

🔊 <input type="range" id="volumeSlider" min="0" max="1" step="0.01">

</div>

<audio id="muzyka" loop></audio>
<script src="Muzyka.js"></script>
<a href="Cennik.html">Powrót</a>
</body>
</html>
